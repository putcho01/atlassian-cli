name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tparse
        run: go install github.com/mfridman/tparse@latest

      - name: Run tests
        run: go test --shuffle on --race -json -v ./... | tee ./test.json | tparse -all | tee -a $GITHUB_STEP_SUMMARY
